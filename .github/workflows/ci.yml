name: CI

on:
  push:
    branches: [ main, adaptive_automation ]
  pull_request:
    branches: [ main, adaptive_automation ]

jobs:
  python-sanity:
    name: Python sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked || uv sync

      - name: Check versions
        run: |
          uv run python3 -m scripts.check_versions

      - name: Run typecheck
        env:
          PYTHONPATH: .
        run: |
          make typecheck

      - name: Run lint
        env:
          PYTHONPATH: .
        run: |
          make lint

      - name: Run tests
        env:
          PYTHONPATH: .
          API_KEY: dummy_ci_key
        run: |
          make test

  frontend-sanity:
    name: Frontend sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: |
          npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: |
          npm run build

  dashboard-runtime-smoke:
    name: Dashboard runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      PYTHONPATH: .
      API_KEY: dummy_ci_key
      TODOIST_DASHBOARD_DEMO: "1"
      TODOIST_AGENT_TRITON_MODEL_ID: sshleifer/tiny-gpt2
      TODOIST_AGENT_TRITON_MODEL_NAME: todoist_llm_ci
      TODOIST_TRITON_DEVICE: cpu
      TODOIST_TRITON_MODEL_DTYPE: float32
      TODOIST_TRITON_TORCH_INSTALL_FLAVOR: cpu
      TODOIST_TRITON_MAX_TOKENS: "32"
      TODOIST_TRITON_TEMPERATURE: "0.0"
      TODOIST_TRITON_TOP_P: "1.0"
      TODOIST_TRITON_TRUST_REMOTE_CODE: "false"
      TODOIST_TRITON_HTTP_PORT: "8003"
      DASHBOARD_API_PORT: "8000"
      DASHBOARD_FRONTEND_PORT: "3000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          uv sync --locked || uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Smoke runtime processes
        shell: bash
        run: |
          set -euo pipefail

          export COMPOSE_PROFILES=dashboard

          cache_root=".cache/todoist-assistant/dashboard"
          api_log="${cache_root}/api.log"
          frontend_log="${cache_root}/frontend.log"
          observer_log="${cache_root}/observer.log"
          triton_log="${cache_root}/triton.log"
          mkdir -p "${cache_root}"
          : > "${observer_log}"

          cleanup() {
            status=$?
            if [[ -n "${FRONTEND_PID:-}" ]] && kill -0 "${FRONTEND_PID}" 2>/dev/null; then
              kill "${FRONTEND_PID}" 2>/dev/null || true
            fi
            if [[ -n "${API_PID:-}" ]] && kill -0 "${API_PID}" 2>/dev/null; then
              kill "${API_PID}" 2>/dev/null || true
            fi
            if [[ -n "${TRITON_LOG_PID:-}" ]] && kill -0 "${TRITON_LOG_PID}" 2>/dev/null; then
              kill "${TRITON_LOG_PID}" 2>/dev/null || true
            fi
            docker compose -f compose.yaml down -v --remove-orphans >/dev/null 2>&1 || true
            if [[ $status -ne 0 ]]; then
              echo "== Triton log =="
              tail -n 80 "${triton_log}" 2>/dev/null || true
              echo "== API log =="
              tail -n 80 "${api_log}" 2>/dev/null || true
              echo "== Frontend log =="
              tail -n 80 "${frontend_log}" 2>/dev/null || true
            fi
            trap - EXIT
            exit $status
          }
          trap cleanup EXIT

          echo "Starting Triton with tiny model override..."
          docker compose -f compose.yaml up -d --build triton
          for _ in $(seq 1 300); do
            if curl -fsS "http://127.0.0.1:${TODOIST_TRITON_HTTP_PORT}/v2/health/ready" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${TODOIST_TRITON_HTTP_PORT}/v2/health/ready" >/dev/null
          docker compose -f compose.yaml logs --no-color triton > "${triton_log}" 2>&1 || true
          tail -n 40 "${triton_log}"

          echo "Starting API process..."
          nohup uv run uvicorn todoist.web.api:app --host 127.0.0.1 --port "${DASHBOARD_API_PORT}" > "${api_log}" 2>&1 &
          API_PID=$!
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${DASHBOARD_API_PORT}/api/health" >/dev/null; then
              break
            fi
            sleep 0.5
          done
          curl -fsS "http://127.0.0.1:${DASHBOARD_API_PORT}/api/health" >/dev/null
          tail -n 30 "${api_log}"

          echo "Starting frontend process..."
          nohup npm --prefix frontend run dev -- --port "${DASHBOARD_FRONTEND_PORT}" > "${frontend_log}" 2>&1 &
          FRONTEND_PID=$!
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${DASHBOARD_FRONTEND_PORT}" >/dev/null; then
              break
            fi
            sleep 0.5
          done
          curl -fsS "http://127.0.0.1:${DASHBOARD_FRONTEND_PORT}" >/dev/null
          tail -n 30 "${frontend_log}"

          echo "Checking runtime log surface..."
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:8000/api/runtime/logs") as res:
              payload = json.load(res)
          assert payload["inspectOnly"] is True
          sources = {item["id"]: item for item in payload["sources"]}
          expected = {"api", "frontend", "observer", "triton", "automation"}
          missing = expected - sources.keys()
          assert not missing, f"missing sources: {sorted(missing)}"
          assert all(item["inspectOnly"] is True for item in payload["sources"])

          for source in ("api", "observer", "triton"):
              url = f"http://127.0.0.1:8000/api/runtime/logs/read?source={source}&tail_lines=20&page=1"
              with urllib.request.urlopen(url) as res:
                  read_payload = json.load(res)
              assert read_payload["inspectOnly"] is True
              assert read_payload["source"] == source
          PY

          echo "Runtime smoke completed; shutting everything down..."
