name: CI

on:
  push:
    branches: [ main, adaptive_automation ]
  pull_request:
    branches: [ main, adaptive_automation ]

jobs:
  python-sanity:
    name: Python sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked || uv sync

      - name: Check versions
        run: |
          uv run python3 -m scripts.check_versions

      - name: Run typecheck
        env:
          PYTHONPATH: .
        run: |
          make typecheck

      - name: Run lint
        env:
          PYTHONPATH: .
        run: |
          make lint

      - name: Run tests
        env:
          PYTHONPATH: .
          API_KEY: dummy_ci_key
        run: |
          make test

  frontend-sanity:
    name: Frontend sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: |
          npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: |
          npm run build
